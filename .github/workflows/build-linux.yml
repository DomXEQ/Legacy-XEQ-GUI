name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download v22 Linux binaries from EquilibriaCC
        run: |
          mkdir -p bin
          echo "=== Downloading EquilibriaCC v22.0.1 Linux release ==="
          wget -q https://github.com/EquilibriaCC/equilibria-wallet/releases/download/v22.0.1/EquilibriaCC-Wallet.22.0.1.linux.x64.tar.xz -O wallet.tar.xz
          echo "=== Extracting archive ==="
          tar xf wallet.tar.xz
          echo "=== Listing extracted contents ==="
          find . -maxdepth 4 -name "xeq-*" -o -name "wallet-cli" -o -name "daemon" | head -20
          echo "=== Searching for binaries ==="
          find . -type f \( -name "xeq-wallet-rpc" -o -name "xeq-d" -o -name "wallet-cli" \) | while read f; do
            echo "Found: $f"
            cp "$f" ./bin/
          done
          echo "=== bin/ contents ==="
          ls -la bin/
          chmod +x bin/*

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 libappindicator3-1

      - name: Build Linux
        run: npm run build:linux

      - name: List build output
        run: |
          echo "=== Build output ==="
          ls -lah dist/electron/Packaged/ 2>/dev/null || echo "Packaged dir not found"

      - name: Upload to latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1
          files: |
            dist/electron/Packaged/*.AppImage
            dist/electron/Packaged/*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
