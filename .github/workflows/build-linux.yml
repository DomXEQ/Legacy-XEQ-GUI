name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download v22 Linux binaries from EquilibriaCC
        run: |
          mkdir -p bin
          echo "=== Downloading EquilibriaCC v22.0.0 daemon/tools release (x86_64 Linux) ==="
          wget -q https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-x86_64-linux.zip -O build-depends.zip
          echo "=== Extracting archive ==="
          unzip -o build-depends.zip
          echo "=== ALL extracted files ==="
          find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -print | grep -v node_modules | grep -v '.git/' | head -60
          echo "=== Searching for binaries ==="
          find . -path ./node_modules -prune -o -path ./.git -prune -o -type f \( -name "xeq-wallet-rpc" -o -name "xeq-d" -o -name "wallet-rpc" -o -name "daemon" -o -name "wallet-cli" -o -name "xeq-wallet-cli" \) -print | head -20
          echo "=== Copying binaries ==="
          for NAME in xeq-wallet-rpc wallet-rpc; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              echo "Found: $F -> bin/xeq-wallet-rpc"
              cp "$F" ./bin/xeq-wallet-rpc
              break
            fi
          done
          for NAME in xeq-d daemon equilibriad; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              echo "Found: $F -> bin/xeq-d"
              cp "$F" ./bin/xeq-d
              break
            fi
          done
          for NAME in xeq-wallet-cli wallet-cli; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              echo "Found: $F -> bin/wallet-cli"
              cp "$F" ./bin/wallet-cli
              break
            fi
          done
          echo "=== Final bin/ contents ==="
          ls -la bin/
          chmod +x bin/*
          echo "=== Verify binaries ==="
          file bin/* || true
          echo "=== Check for xeq-wallet-rpc ==="
          if [ ! -f bin/xeq-wallet-rpc ]; then
            echo "FATAL: xeq-wallet-rpc not found! Build will fail."
            exit 1
          fi
          echo "All required binaries present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 libappindicator3-1

      - name: Build Linux
        run: npm run build:linux

      - name: List build output
        run: |
          echo "=== Build output ==="
          ls -lah dist/electron/Packaged/ 2>/dev/null || echo "Packaged dir not found"

      - name: Upload to latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1
          files: |
            dist/electron/Packaged/*.AppImage
            dist/electron/Packaged/*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
